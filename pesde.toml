name = "word30210/luau_result"
version = "0.1.3"
description = "a simple Result<T, E> implemantaion"
authors = ["word30210"]
repository = "https://github.com/Word30210/luau-result"
license = "MIT"
includes = ["src/**", "pesde.toml", "LICENSE", "README.md"]

[engines]
pesde = "^0.7.1"
lune = "^0.10.4"

[target]
environment = "luau"
lib = "src/lib.luau"

[dev_dependencies]
darklua = { name = "pesde/darklua", version = "^0.18.0", target = "lune" }
multitarget = { name = "ewdev/multitarget", version = "^0.4.2-rc.7", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.7.0-rc.1", target = "lune" }
frktest = { name = "itsfrank/frktest", version = "^0.0.2", target = "lune" }

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
build = "scripts/build.luau"